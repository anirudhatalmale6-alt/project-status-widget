<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d1117">
    <title>AF Tracker</title>
    <link rel="manifest" href="{{ url_for('static', filename='manifest-mini.json') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/icon-192.png') }}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #fff;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            border-radius: 16px;
            user-select: none;
        }

        .mini-widget {
            display: flex;
            flex-direction: column;
            height: 100vh;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            overflow: hidden;
        }

        /* Drag handle / title bar */
        .mini-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            background: #161b22;
            cursor: move;
            -webkit-app-region: drag;
            flex-shrink: 0;
        }

        .mini-header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .mini-logo {
            height: 20px;
            background: rgba(255,255,255,0.9);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .mini-title {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .mini-close {
            -webkit-app-region: no-drag;
            background: none;
            border: none;
            color: rgba(255,255,255,0.3);
            cursor: pointer;
            font-size: 14px;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .mini-close:hover { color: #fff; background: rgba(255,255,255,0.1); }

        /* Search */
        .mini-search {
            display: flex;
            padding: 8px 10px;
            gap: 6px;
            background: #0d1117;
            flex-shrink: 0;
        }

        .mini-search input {
            flex: 1;
            background: #161b22;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 7px 10px;
            color: #fff;
            font-size: 12px;
            outline: none;
        }
        .mini-search input:focus { border-color: #276EF1; }
        .mini-search input::placeholder { color: rgba(255,255,255,0.25); }

        .mini-search button {
            background: #276EF1;
            border: none;
            border-radius: 8px;
            color: #fff;
            padding: 7px 14px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        .mini-search button:hover { background: #1B5CD7; }

        /* Results area */
        .mini-results {
            flex: 1;
            overflow-y: auto;
            padding: 4px 10px 10px;
        }

        .mini-results::-webkit-scrollbar { width: 4px; }
        .mini-results::-webkit-scrollbar-track { background: transparent; }
        .mini-results::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

        /* Empty state */
        .mini-empty {
            text-align: center;
            padding: 30px 10px;
            color: rgba(255,255,255,0.25);
            font-size: 12px;
        }
        .mini-empty svg { margin-bottom: 8px; opacity: 0.3; }

        /* Card */
        .mini-card {
            background: #161b22;
            border-radius: 10px;
            margin-bottom: 6px;
            overflow: hidden;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        .mini-card.urgent { border: 1.5px solid #E54D42; }

        /* Card collapsed row */
        .mini-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 10px;
            cursor: pointer;
            gap: 8px;
        }
        .mini-row:hover { background: rgba(255,255,255,0.02); }

        .mini-name {
            font-size: 12px;
            font-weight: 600;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            min-width: 0;
        }

        .mini-status {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 2px 6px;
            border-radius: 4px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .mini-eta {
            font-size: 11px;
            font-weight: 700;
            color: #fff;
            background: #276EF1;
            padding: 3px 8px;
            border-radius: 10px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .mini-eta.delivered { background: #05944F; }
        .mini-eta.urgent { background: #E54D42; }
        .mini-eta.delayed { background: #E54D42; }

        .mini-chevron {
            color: rgba(255,255,255,0.3);
            transition: transform 0.2s;
            flex-shrink: 0;
        }

        /* Expanded detail */
        .mini-detail {
            display: none;
            padding: 0 10px 10px;
        }

        .mini-card.expanded .mini-detail { display: block; }
        .mini-card.expanded .mini-chevron { transform: rotate(180deg); }

        /* Progress steps in mini */
        .mini-steps {
            display: flex;
            justify-content: space-between;
            margin: 6px 0 8px;
            position: relative;
        }

        .mini-steps::before {
            content: '';
            position: absolute;
            top: 8px;
            left: 12px;
            right: 12px;
            height: 2px;
            background: rgba(255,255,255,0.06);
        }

        .mini-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .mini-step-dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #21262d;
            border: 2px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 3px;
        }
        .mini-step-dot svg { width: 8px; height: 8px; color: rgba(255,255,255,0.3); }

        .mini-step.done .mini-step-dot { background: #05944F; border-color: #05944F; }
        .mini-step.done .mini-step-dot svg { color: #fff; }
        .mini-step.active .mini-step-dot { background: #276EF1; border-color: #276EF1; box-shadow: 0 0 0 3px rgba(39,110,241,0.2); }
        .mini-step.active .mini-step-dot svg { color: #fff; }
        .mini-step.active.urgent-step .mini-step-dot { background: #E54D42; border-color: #E54D42; box-shadow: 0 0 0 3px rgba(229,77,66,0.2); }

        .mini-step-label {
            font-size: 7px;
            color: rgba(255,255,255,0.3);
            text-align: center;
            font-weight: 600;
            max-width: 44px;
        }
        .mini-step.done .mini-step-label { color: #05944F; }
        .mini-step.active .mini-step-label { color: #276EF1; }
        .mini-step.active.urgent-step .mini-step-label { color: #E54D42; }

        .mini-info-row {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            font-size: 10px;
        }
        .mini-info-label { color: rgba(255,255,255,0.4); }
        .mini-info-value { color: #fff; font-weight: 600; }

        /* Mini urgent btn */
        .mini-urgent-btn {
            display: flex;
            align-items: center;
            gap: 3px;
            font-size: 9px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            margin-top: 6px;
        }
        .mini-urgent-btn:hover { background: rgba(255,255,255,0.1); }
        .mini-urgent-btn.active { background: #E54D42; border-color: #E54D42; color: #fff; }

        .mini-not-found {
            text-align: center;
            color: rgba(255,255,255,0.3);
            font-size: 12px;
            padding: 16px;
        }

        /* History label */
        .mini-history-label {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.3);
            padding: 6px 0 4px;
            margin-top: 4px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        /* Open full view link */
        .mini-footer {
            padding: 6px 10px;
            background: #161b22;
            text-align: center;
            flex-shrink: 0;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        .mini-footer a {
            color: #276EF1;
            text-decoration: none;
            font-size: 10px;
            font-weight: 600;
        }
        .mini-footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="mini-widget">
        <div class="mini-header">
            <div class="mini-header-left">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="AF" class="mini-logo">
                <span class="mini-title">TRACKER</span>
            </div>
            <button class="mini-close" onclick="window.close()" title="Close">&times;</button>
        </div>

        <div class="mini-search">
            <input type="text" id="miniSearchInput" placeholder="Name or Claim #..." autofocus>
            <button id="miniSearchBtn">Track</button>
        </div>

        <div class="mini-results" id="miniResults">
            <div class="mini-empty" id="miniEmpty">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                <div>Search to track inspections</div>
            </div>
        </div>

        <div class="mini-footer">
            <a href="/widget" target="_blank">Open Full View</a>
        </div>
    </div>

    <script>
        const STAGES = ['Scheduled', 'Inspection', 'Report Writing', 'Delivered'];
        const STAGE_ICONS_MINI = {
            'Scheduled': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/></svg>',
            'Inspection': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>',
            'Report Writing': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>',
            'Delivered': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>'
        };

        const PINNED_KEY = 'af_pinned_names';
        const URGENCY_KEY = 'af_urgency';

        function getPinned() { try { return JSON.parse(localStorage.getItem(PINNED_KEY)) || []; } catch { return []; } }
        function savePinned(list) { localStorage.setItem(PINNED_KEY, JSON.stringify(list)); }
        function addPinned(name) {
            const list = getPinned();
            if (!list.find(p => p.toLowerCase() === name.trim().toLowerCase())) { list.push(name.trim()); savePinned(list); }
        }
        function getUrgency() { try { return JSON.parse(localStorage.getItem(URGENCY_KEY)) || {}; } catch { return {}; } }
        function isUrgent(name) { return !!getUrgency()[name.trim().toLowerCase()]; }
        function setUrgency(name, val) {
            const m = getUrgency(); if (val) m[name.trim().toLowerCase()] = true; else delete m[name.trim().toLowerCase()];
            localStorage.setItem(URGENCY_KEY, JSON.stringify(m));
        }

        function headerToKey(h) { return h.trim().toLowerCase().replace(/\s+/g, '_'); }

        function parseLocalDate(d) {
            if (!d) return null;
            const p = d.match(/(\d{4})-(\d{2})-(\d{2})/);
            return p ? new Date(parseInt(p[1]), parseInt(p[2])-1, parseInt(p[3])) : null;
        }

        function deriveStatus(project, keys) {
            const now = new Date(); now.setHours(0,0,0,0);
            const iKey = keys.find(k => k.includes('inspection'));
            const dKey = keys.find(k => k.includes('delivery') || k.includes('expected'));
            const dlKey = keys.find(k => k.includes('delay'));
            const iDate = iKey ? parseLocalDate(project[iKey]) : null;
            const dDate = dKey ? parseLocalDate(project[dKey]) : null;
            const hasDelay = dlKey && project[dlKey] && project[dlKey].trim() !== '';
            if (iDate) iDate.setHours(0,0,0,0);
            if (dDate) dDate.setHours(0,0,0,0);
            if (hasDelay) return { status: 'Delayed', stageIndex: -1 };
            if (dDate && now > dDate) return { status: 'Delivered', stageIndex: 3 };
            if (iDate && now >= iDate) return { status: 'Report Writing', stageIndex: 2 };
            if (iDate && now < iDate) return { status: 'Scheduled', stageIndex: 0 };
            return { status: 'Scheduled', stageIndex: 0 };
        }

        function getDaysLeft(delivery) {
            if (!delivery) return null;
            const d = parseLocalDate(delivery); if (!d) return null;
            const now = new Date(); now.setHours(0,0,0,0);
            return Math.round((d - now) / (86400000));
        }

        function getCountdownText(delivery, urgent) {
            if (!delivery) return '?';
            const d = parseLocalDate(delivery); if (!d) return '?';
            if (urgent) {
                d.setHours(17,0,0,0);
                const diff = d - new Date();
                if (diff <= 0) return 'Overdue';
                const days = Math.floor(diff / 86400000);
                const hrs = Math.floor((diff % 86400000) / 3600000);
                return days > 0 ? `${days}d ${hrs}h` : `${hrs}h`;
            }
            const days = getDaysLeft(delivery);
            if (days === null) return '?';
            if (days < 0) return `${Math.abs(days)}d late`;
            if (days === 0) return 'Today';
            if (days === 1) return 'Tomorrow';
            return `${days} days`;
        }

        function renderMiniCard(project, headers, expanded) {
            const keys = headers ? headers.map(h => headerToKey(h)) : Object.keys(project);
            const nameKey = keys.find(k => k === 'name') || keys.find(k => k.includes('name') && !k.includes('last'));
            const lastKey = keys.find(k => k.includes('last'));
            const cityKey = keys.find(k => k === 'city');
            const stateKey = keys.find(k => k === 'state');
            const inspKey = keys.find(k => k.includes('inspection'));
            const delKey = keys.find(k => k.includes('delivery') || k.includes('expected'));

            const name = [project[nameKey], project[lastKey]].filter(Boolean).join(' ') || 'Client';
            const location = [project[cityKey], project[stateKey]].filter(Boolean).join(', ');
            const { status, stageIndex } = deriveStatus(project, keys);
            const delivery = delKey ? project[delKey] : '';
            const inspection = inspKey ? project[inspKey] : '';
            const urgent = isUrgent(name);
            const eta = getCountdownText(delivery, urgent);
            const isCompleted = stageIndex === 3;
            const isDelayed = stageIndex === -1;
            const activeStage = isDelayed ? 2 : stageIndex;

            const etaClass = isCompleted ? 'delivered' : (urgent || isDelayed) ? 'urgent' : '';
            const cardClass = `mini-card${urgent && !isCompleted ? ' urgent' : ''}${expanded ? ' expanded' : ''}`;

            const formatDate = (d) => {
                if (!d) return '-';
                const dt = parseLocalDate(d);
                return dt ? dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : d;
            };

            const stepsHtml = STAGES.map((s, i) => {
                let cls = '';
                if (isCompleted) cls = 'done';
                else if (i < activeStage) cls = 'done';
                else if (i === activeStage && !isDelayed) cls = 'active' + (urgent ? ' urgent-step' : '');
                return `<div class="mini-step ${cls}"><div class="mini-step-dot">${STAGE_ICONS_MINI[s]}</div><span class="mini-step-label">${s}</span></div>`;
            }).join('');

            const urgBtnClass = urgent ? 'mini-urgent-btn active' : 'mini-urgent-btn';
            const urgLabel = urgent ? 'URGENT' : 'Mark Urgent';

            return `<div class="${cardClass}" data-name="${name.replace(/"/g, '&quot;')}">
                <div class="mini-row" onclick="toggleMini(this)">
                    <span class="mini-name">${name}</span>
                    <span class="mini-eta ${etaClass}">${eta}</span>
                    <svg class="mini-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="12" height="12"><polyline points="6 9 12 15 18 9"/></svg>
                </div>
                <div class="mini-detail">
                    <div class="mini-steps">${stepsHtml}</div>
                    <div class="mini-info-row"><span class="mini-info-label">Status</span><span class="mini-info-value">${status}</span></div>
                    ${location ? `<div class="mini-info-row"><span class="mini-info-label">Location</span><span class="mini-info-value">${location}</span></div>` : ''}
                    <div class="mini-info-row"><span class="mini-info-label">Inspection</span><span class="mini-info-value">${formatDate(inspection)}</span></div>
                    <div class="mini-info-row"><span class="mini-info-label">Delivery</span><span class="mini-info-value">${formatDate(delivery)}</span></div>
                    ${!isCompleted ? `<button class="${urgBtnClass}" onclick="event.stopPropagation(); toggleMiniUrgency('${name.replace(/'/g, "\\'")}', this)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="10" height="10"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>
                        ${urgLabel}
                    </button>` : ''}
                </div>
            </div>`;
        }

        function toggleMini(row) {
            row.closest('.mini-card').classList.toggle('expanded');
        }

        function toggleMiniUrgency(name, btn) {
            const nowUrg = !isUrgent(name);
            setUrgency(name, nowUrg);
            if (nowUrg) { btn.classList.add('active'); btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="10" height="10"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg> URGENT'; }
            else { btn.classList.remove('active'); btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="10" height="10"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg> Mark Urgent'; }
            const card = btn.closest('.mini-card');
            if (nowUrg) card.classList.add('urgent'); else card.classList.remove('urgent');
            fetch('/api/notify-urgent', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({name, urgent: nowUrg}) }).catch(()=>{});
            setTimeout(() => doMiniSearch(false), 300);
        }

        let currentMiniSearchNames = [];

        async function doMiniSearch(pin) {
            const q = document.getElementById('miniSearchInput').value.trim();
            const results = document.getElementById('miniResults');
            const empty = document.getElementById('miniEmpty');
            if (!q) { results.innerHTML = ''; if (empty) results.appendChild(empty); empty.style.display = ''; currentMiniSearchNames = []; refreshMiniPinned(); return; }
            if (empty) empty.style.display = 'none';

            try {
                const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
                const data = await res.json();
                if (!data.results || !data.results.length) {
                    let html = '<div class="mini-not-found">Not found</div>';
                    currentMiniSearchNames = [];
                    const pinnedHtml = await getMiniPinnedHtml();
                    results.innerHTML = html + pinnedHtml;
                    return;
                }

                const keys = data.headers ? data.headers.map(h => headerToKey(h)) : [];
                const nk = keys.find(k => k === 'name') || keys.find(k => k.includes('name') && !k.includes('last'));
                const lk = keys.find(k => k.includes('last'));
                currentMiniSearchNames = data.results.map(p => [p[nk], p[lk]].filter(Boolean).join(' ').trim().toLowerCase());

                let html = data.results.map(p => renderMiniCard(p, data.headers, true)).join('');
                if (pin !== false) data.results.forEach(p => { const fn = [p[nk], p[lk]].filter(Boolean).join(' '); if (fn) addPinned(fn); });

                const pinnedHtml = await getMiniPinnedHtml();
                results.innerHTML = html + pinnedHtml;
            } catch(e) {
                results.innerHTML = '<div class="mini-not-found">Connection error</div>';
            }
        }

        async function getMiniPinnedHtml() {
            const pinned = getPinned().filter(n => !currentMiniSearchNames.includes(n.toLowerCase()));
            if (!pinned.length) return '';
            let html = '<div class="mini-history-label">History</div>';
            for (const name of pinned) {
                try {
                    const res = await fetch(`/api/search?q=${encodeURIComponent(name)}`);
                    const data = await res.json();
                    if (data.results && data.results.length) {
                        html += data.results.map(p => renderMiniCard(p, data.headers, false)).join('');
                    }
                } catch(e) {}
            }
            return html;
        }

        async function refreshMiniPinned() {
            const results = document.getElementById('miniResults');
            const pinnedHtml = await getMiniPinnedHtml();
            // Keep existing search results, replace pinned section
            const histLabel = results.querySelector('.mini-history-label');
            if (histLabel) {
                // Remove everything from history label onward
                while (histLabel.nextSibling) histLabel.nextSibling.remove();
                histLabel.remove();
            }
            results.insertAdjacentHTML('beforeend', pinnedHtml);
        }

        document.getElementById('miniSearchBtn').addEventListener('click', () => doMiniSearch(true));
        document.getElementById('miniSearchInput').addEventListener('keypress', e => { if (e.key === 'Enter') doMiniSearch(true); });

        let miniDebounce;
        document.getElementById('miniSearchInput').addEventListener('input', () => {
            clearTimeout(miniDebounce);
            miniDebounce = setTimeout(() => {
                if (document.getElementById('miniSearchInput').value.trim().length >= 2) doMiniSearch(true);
            }, 400);
        });

        // Load pinned on start
        document.addEventListener('DOMContentLoaded', () => refreshMiniPinned());
    </script>
</body>
</html>
